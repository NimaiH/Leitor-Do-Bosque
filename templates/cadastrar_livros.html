{% extends "base.html" %}

{% block title %}Adicionar Livro - Leitor do Bosque{% endblock %}

{% block extra_css %}
<style>
    .card-formulario {
        border-radius: 20px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        max-width: 520px;
        margin: 0 auto;
    }
    .form-control {
        border-radius: 10px;
        border: 1px solid #c3d9c1;
        padding: 10px 14px;
    }
    .form-control:focus {
        border-color: #2d5a27;
        box-shadow: 0 0 0 0.2rem rgba(45, 90, 39, 0.15);
    }
    .form-label {
        color: #2d5a27;
        font-weight: 600;
        font-size: 0.9rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">

    <div class="text-center mb-4">
        <h2 style="font-family: 'Libre Baskerville', serif; color: #2d5a27;">Novo Registro</h2>
        <p class="text-muted">Adicione um livro ao seu histórico</p>
    </div>

    <div class="card card-formulario p-4 p-md-5">
        <form action="/salvar_livro" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Título do Livro</label>
                <input type="text" name="titulo" class="form-control"
                       placeholder="Ex: Dom Casmurro" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Foto da Capa <span class="text-muted fw-normal">(opcional)</span></label>
                <input type="file" name="capa" class="form-control" accept="image/*">
            </div>

            <div class="mb-4">
                <label class="form-label">Número de Páginas</label>
                <input type="number" name="paginas" class="form-control"
                       placeholder="Ex: 180" min="1">
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-bosque btn-lg">
                    📚 Salvar no Histórico
                </button>
                <a href="/estante" class="btn btn-outline-secondary">
                    ← Voltar para Minha Estante
                </a>
            </div>

        </form>
    </div>

</div>
{% endblock %}
