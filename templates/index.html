<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor do Bosque</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    <div class="container py-4">
        <header class="text-center mb-4">
            <h1 class="fw-bold text-success">Leitor Do Bosque</h1>
            <p class="text-secondary">Parque do Carmo - Itaquera</p>
        </header>

        <div>
            <div class="card card-status p-4 mb-4">
                <h5 class="mb-0">🌲 Nível: Explorador</h5>
                <span class="badge bg-success">XP: 120</span>
            </div>
        </div>
        <p class="small text-muted">Você já leu <strong>3 livros</strong>do Bosque!</p>

        <div class="progress" style="height: 12px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 60%;"></div>
        </div>
        <p class="text-center mt-2 mb-0 small text-muted">Faltam 80 XP para o nível Guardião</p>


        <div>
            <a href="/cadastrar_livros" class="btn btn-gamificado shadow-sm w-100">
    ✍️ Cadastrar Livro
</a>
        </div>

    </div>
    
</body>
</html>
