<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Leitor do Bosque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Estilos específicos para a página de cadastro */
        body {
            background-color: #f0f4f1; /* Verde bem pálido de fundo */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card-cadastro {
            border-radius: 20px;
            border: none;
            overflow: hidden;
        }
        .form-label {
            color: #2d5a27; /* Verde escuro do bosque */
            font-weight: 500;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #c3d9c1;
        }
        .form-control:focus {
            border-color: #76a871;
            box-shadow: 0 0 0 0.2rem rgba(118, 168, 113, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card card-cadastro shadow-lg">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-5">
                        <h1 class="titulo-bosque h2">Leitor do Bosque</h1>
                        <p class="text-muted">Crie sua conta e comece sua jornada literária</p>
                    </div>

                    <form action="/salvar_usuario" method="POST">
                        
                        <div class="mb-4">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control form-control-lg" id="nome" name="nome" placeholder="Seu Nome" required>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="seu.email@exemplo.com" required>
                        </div>

                        <div class="mb-5">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control form-control-lg" id="senha" name="senha" placeholder="********" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-bosque btn-lg shadow-sm">Cadastrar</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted">Já tem uma conta? <a href="/login" class="text-success">Faça login</a></p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
