{% extends "base.html" %}

{% block title %}Entrar - Leitor do Bosque{% endblock %}

{% block extra_css %}
<style>
    /* Mantendo apenas o que é exclusivo do visual de login */
    body {
        background: linear-gradient(rgba(45, 90, 39, 0.1), rgba(45, 90, 39, 0.1)),
                    url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80&w=1500');
        background-size: cover;
        background-position: center;
        min-height: 100vh;
    }
    .card-login {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card card-login p-4">
                <h2 class="text-center mb-4">Bem-vindo de volta</h2>
                {% if erro %}
                <div class="alert alert-danger">{{ erro }}</div>
                {% endif %}
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">E-mail</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Senha</label>
                        <input type="password" name="senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-bosque w-100">Entrar no Bosque</button>
                </form>
                <div class="text-center mt-3">
                    <p class="small text-muted">Ainda não tem uma conta? <br>
                        <a href="/cadastro" class="text-success fw-bold text-decoration-none">Criar Conta</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
