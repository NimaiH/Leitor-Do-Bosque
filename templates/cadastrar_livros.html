<!DOCTYPE html>
<html lang="pt-br">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Livro - Leitor do Bosque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>
    <div class="container py-4">
        <header class="text-center mb-4">
            <h1 class="fw-bold text-success">Novo Registro</h1>
            <p class="text-secondary">Adicione um livro ao seu histórico</p>
        </header>

        <div class="card card-status p-4">
            <form action="/salvar_livro" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Título do Livro</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ex: Dom Casmurro" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Foto da Capa</label>
                    <input type="file" name="capa" class="form-control" accept="image/*">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Número de Páginas</label>
                    <input type="number" name="paginas" class="form-control" placeholder="Ex: 180">
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-gamificado">SALVAR NO HISTÓRICO</button>
                    <a href="/" class="btn btn-outline-secondary">CANCELAR</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
