{% extends "base.html" %}

{% block title %}Cadastro - Leitor do Bosque{% endblock %}

{% block extra_css %}
<style>
    /* 🌲 A Mágica Acontece Aqui: Imagem de Fundo na Caixa Centralizadora */
    .cadastro-wrapper {
        background: linear-gradient(rgba(200, 217, 193, 0.7), rgba(200, 217, 193, 0.7)),
                    url('https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&q=80&w=1500');
        background-size: cover;
        background-position: center;
        min-height: 85vh; /* Ajustado para não brigar com a navbar */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 50px 0;
    }
    .card-cadastro {
        border-radius: 20px;
        border: none;
        width: 100%;
        background: rgba(255, 255, 255, 0.95); /* Deixa o card levemente transparente */
        backdrop-filter: blur(5px); /* Efeito de vidro borrado */
    }
    .form-control {
        border-radius: 10px;
        border: 1px solid #c3d9c1;
    }
</style>
{% endblock %}

{% block content %}
<div class="cadastro-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5"> <div class="card card-cadastro shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <h1 class="h2" style="color: var(--verde-bosque); font-family: 'Libre Baskerville', serif;">Leitor do Bosque</h1>
                            <p class="text-muted">Crie sua conta e comece sua jornada literária</p>
                        </div>

                        {% if erro %}
                        <div class="alert alert-danger">{{ erro }}</div>
                        {% endif %}

                        <form action="/salvar_usuario" method="POST">
                            <div class="mb-4">
                                <label for="nome" class="form-label fw-bold">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" name="nome" placeholder="Seu Nome" required>
                            </div>

                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold">E-mail</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="seu@email.com" required>
                            </div>

                            <div class="mb-5">
                                <label for="senha" class="form-label fw-bold">Senha</label>
                                <input type="password" class="form-control" id="senha" name="senha" placeholder="********" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-bosque btn-lg">Cadastrar</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">Já tem uma conta? <a href="/login" class="text-success fw-bold">Faça login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
