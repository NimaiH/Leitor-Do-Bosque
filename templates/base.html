<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}Leitor do Bosque{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* CONFIGURAÇÕES DE CORES: Definimos as cores padrão do projeto */
        :root { 
            --verde-bosque: #2d5a27; 
            --creme-suave: #f8f9fa; 
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--creme-suave); 
        }
        
        h1, h2, h3 { 
            font-family: 'Libre Baskerville', serif; 
            color: var(--verde-bosque); 
        }

        /* ESTILO DA NAVBAR: Fundo branco com uma linha verde grossa embaixo */
        .navbar { 
            background-color: white; 
            border-bottom: 3px solid var(--verde-bosque); 
        }
        
        /* BOTÃO PERSONALIZADO: Arredondado e com efeito de subir ao passar o mouse */
        .btn-bosque { 
            background-color: var(--verde-bosque); 
            color: white; 
            border-radius: 30px; 
            padding: 8px 25px; 
            transition: 0.3s; 
            border: none;
        }
        .btn-bosque:hover { 
            background-color: #1e3d1a; 
            color: white; 
            transform: translateY(-2px); 
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="/">🌲 Leitor do Bosque</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link mx-2" href="/sobre">Sobre o Bosque</a></li>
                    <li class="nav-item"><a class="nav-link mx-2" href="#">Ranking</a></li>

                    {% if session.get('usuario_id') %}
                        <li class="nav-item">
                            <a class="nav-link mx-2 fw-bold" href="/estante">Minha Estante</a>
                        </li>
                        <li class="nav-item">
                            <span class="nav-link text-success fw-bold">Olá, {{ session.usuario_nome }}! 🌲</span>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-outline-danger btn-sm ms-lg-3" href="/logout">Sair</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="btn btn-bosque btn-sm ms-lg-3" href="/login">Entrar / Cadastrar</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
